<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Amazon</title>
    <link rel="stylesheet" href="./giorno 10 esame/assets/css/reset.css">
     <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
    <link rel="stylesheet" href="./giorno 10 esame/assets/css/style.css">
</head>
<body>

  <header class="main-header">
    <div class="header-logo">
        <img src="./giorno 10 esame/assets/images/logo.png" alt="Logo">
    </div>

    <nav class="header-scritte">
        <ul>
            <li>All</li>
            <li>Today's deals</li>
            <li>Customer Service</li>
            <li>Registry</li>
            <li>Gift Cards</li>
            <li>Sell</li>
        </ul>
    </nav>
</header>

<section>
    <div class="banner-arancione">
        <h1>Shop All Holiday Gift Cards</h1>
    </div>
</section>

<section class="banner-verde">
    <div class="contenuto-banner">
        <h2>Holiday Gift Guides</h2>
        <p>Be a go-gifter</p>
    </div>
</section>

<section class="sezione-prodotti">
    <div class="prodotti-header">
        <span>Find the perfect gift</span>
        <a href="https://www.amazon.it">Shop now</a>
    </div>

    <div class="griglia-flex">
        <div class="card-prodotto card-kindle">
            <img src="./giorno 10 esame/assets/images/img_1.jpg" alt="Kindle">
        </div>
        <div class="card-prodotto card-pc">
            <img src="./giorno 10 esame/assets/images/img_2.jpg" alt="pc">
        </div>
        <div class="card-prodotto card-orologio">
            <img src="./giorno 10 esame/assets/images/img_3.jpg" alt="orologio">
        </div>
        <div class="card-prodotto card-cane">
            <img src="./giorno 10 esame/assets/images/img_4.jpg" alt="cane">
        </div>
    </div>
</section>

<section class="banner-vr">
    <div class="contenuto-banner-vr">
       <a href="https://www.amazon.it">Play the gifting game</a>
    </div>
</section>

<section class="banner-marshall">
    <div class="contenuto-marshall">
       <a href="https://www.amazon.it">shop Audio & accessories</a>
    </div>
</section>

<footer class="footer">
    <div class="back-to-top">
        <a href="https://www.amazon.it">Back to top</a>
    </div>

    <div class="footer-logo">
        <img src="./giorno 10 esame/assets/images/logo.png" alt="Amazon Logo" class="footer-logo">
    </div>
</footer>
</body>
</html>
