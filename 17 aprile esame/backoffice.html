<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backoffice - Gestione Specie</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="index.html">Admin Panel</a>
        <a class="btn btn-outline-light btn-sm" href="index.html"
          >Torna allo Shop</a
        >
      </div>
    </nav>

    <div class="container my-5">
      <div class="row justify-content-center">
        <div class="col-md-8 bg-white p-4 shadow-sm rounded">
          <div id="alert-container"></div>

          <h2 id="form-title" class="mb-4">Aggiungi Nuovo Prodotto</h2>

          <form id="product-form">
            <div class="mb-3">
              <label for="name" class="form-label">Nome Specie</label>
              <input
                type="text"
                class="form-control"
                id="name"
                placeholder="Esempio: Corydoras Maculatus"
                required
              />
            </div>
            <div class="mb-3">
              <label for="description" class="form-label">Descrizione</label>
              <textarea
                class="form-control"
                id="description"
                rows="3"
                required
              ></textarea>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="brand" class="form-label">Marca/Brand</label>
                <input type="text" class="form-control" id="brand" required />
              </div>
              <div class="col-md-6 mb-3">
                <label for="price" class="form-label">Prezzo (€)</label>
                <input type="number" class="form-control" id="price" required />
              </div>
            </div>
            <div class="mb-3">
              <label for="imageUrl" class="form-label">URL Immagine</label>
              <input
                type="url"
                class="form-control"
                id="imageUrl"
                placeholder="https://..."
                required
              />
            </div>

            <div class="d-flex justify-content-between mt-4">
              <button type="reset" class="btn btn-secondary">Reset Form</button>
              <div>
                <button
                  type="button"
                  id="delete-btn"
                  class="btn btn-danger d-none"
                >
                  Elimina
                </button>
                <button type="submit" class="btn btn-primary">
                  Salva Prodotto
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/backoffice.js" type="module"></script>
  </body>
</html>
